<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 Fully Erect Fantasy Football</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            color: white;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .collage {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            grid-gap: 10px;
            padding: 12px;
        }
        .collage img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
        }
        .poll-area {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 460px;
            padding: 40px;
            background: rgba(0, 0, 0, 0.93);
            border-radius: 18px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.8);
        }
        .title {
            text-align: center;
            margin-bottom: 30px;
        }
        h1 { font-size: 2.05em; margin-bottom: 10px; }
        .subtitle { font-size: 1.02em; opacity: 0.9; }
        h2 { margin-bottom: 14px; font-size: 1.2em; }
        label { 
            display: block; 
            margin: 9px 0; 
            font-size: 1.02em;
            cursor: pointer; 
        }
        a { 
            color: #4da6ff; 
            text-decoration: underline; 
            font-weight: bold;
        }
        a:hover { color: #80c1ff; }
        button {
            width: 100%;
            padding: 15px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.15em;
            margin-top: 25px;
            cursor: pointer;
        }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <div class="collage" id="collage"></div>

    <div class="poll-area">
        <form id="pollForm">
            <div class="title">
                <h1>2026 Fully Erect Fantasy Football</h1>
                <div class="subtitle">2026 Winner: Adam  2026 Loser: Hayden</div>
            </div>
           
            <div style="margin-bottom:32px">
                <h2>1. Can you come to a Fantasy Football Pre-Draft Summit on Sunday 07/19 @2pm PST?</h2>
                <label><input type="radio" name="attendance" value="Yes" required> Yes</label>
                <label><input type="radio" name="attendance" value="No"> No</label>
            </div>
           
            <div style="margin-bottom:32px">
                <h2>2. Please select the best days of the week to draft (select as many as you like):</h2>
                <label><input type="checkbox" name="days" value="Sundays in August"> Sundays in August</label>
                <label><input type="checkbox" name="days" value="Wednesdays in August"> Wednesdays in August</label>
                <label><input type="checkbox" name="days" value="Thursdays in August"> Thursdays in August</label>
                <label><input type="checkbox" name="days" value="Saturdays in August"> Saturdays in August</label>
            </div>

            <div style="margin-bottom:32px">
                <h2>3. Click here to nominate a new commissioner</h2>
                <p><a href="https://youtu.be/IJmIGC0nwK0?t=41" target="_blank">Click here</a></p>
            </div>
           
            <button type="submit">Submit My Votes</button>
        </form>
    </div>

    <script>
        const imagePaths = [
            "p2.png", "p3.png", "p4.png",
            "p5.png", "p6.png", "p7.png",
            "p8.png", "p9.png", "p20.png",
            "p11.png", "p12.png", "p13.png",
            "p14.png", "p15.png"
        ];

        function createCollage() {
            const container = document.getElementById('collage');
            container.innerHTML = '';
            imagePaths.forEach(src => {
                const img = document.createElement('img');
                img.src = src;
                img.onerror = () => img.style.display = 'none';
                container.appendChild(img);
            });
        }

        // Form submission to Formspree
        document.getElementById('pollForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            
            fetch('https://formspree.io/f/mzdnzyoo', {
                method: 'POST',
                body: formData,
                headers: {
                    'Accept': 'application/json'
                }
            })
            .then(response => {
                if (response.ok) {
                    alert("✅ Thank you! Your votes have been recorded.");
                    this.reset();
                } else {
                    alert("Something went wrong. Please try again.");
                }
            })
            .catch(() => {
                alert("✅ Thank you! Your votes have been recorded.");
                this.reset();
            });
        });

        window.onload = createCollage;
    </script>
</body>
</html>
